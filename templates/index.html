<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Video2Text · 社媒视频一键转文案</title>
<style>
  :root{
    --bg:#0b0f1a; --panel:#121826; --panel2:#1a2236; --line:#26304a;
    --txt:#e6ecf7; --sub:#8a97b3; --accent:#6c8cff; --accent2:#34d399;
    --danger:#f87171; --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    background:radial-gradient(1200px 600px at 70% -10%,#1b2540 0%,var(--bg) 55%);
    color:var(--txt);height:100vh;overflow:hidden;padding:18px 28px;
  }
  .wrap{max-width:1280px;margin:0 auto;height:100%;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-shrink:0}
  .logo{
    width:40px;height:40px;border-radius:11px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#0b0f1a;
  }
  h1{font-size:20px;letter-spacing:.5px}
  h1 small{display:block;font-size:11px;color:var(--sub);font-weight:400;margin-top:2px}
  .bar{
    display:flex;gap:10px;background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius);padding:10px 12px;margin-bottom:14px;flex-shrink:0;
  }
  .bar input{
    flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:10px;padding:10px 14px;font-size:14px;outline:none;transition:.2s;
  }
  .bar input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,140,255,.15)}
  .bar button{
    background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0b0f1a;border:none;
    font-weight:700;padding:0 20px;border-radius:10px;cursor:pointer;font-size:14px;transition:.15s;
  }
  .bar button:disabled{opacity:.5;cursor:not-allowed}
  .bar input:disabled{opacity:.4}
  .bar .btn-stop{
    background:var(--danger);color:#fff;border:none;
    font-weight:700;padding:0 20px;border-radius:10px;cursor:pointer;font-size:14px;transition:.15s;
  }
  .bar .btn-stop:disabled{opacity:.4;cursor:not-allowed}
  .bar .skip-label{
    display:flex;align-items:center;gap:5px;color:var(--sub);font-size:12px;white-space:nowrap;cursor:pointer;
  }
  .bar .skip-label input[type=checkbox]{accent-color:var(--accent2);width:14px;height:14px;cursor:pointer}
  .existing-badge{
    display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;
    background:rgba(52,211,153,.15);color:var(--accent2);border:1px solid rgba(52,211,153,.3);
  }
  .existing-badge.warn{background:rgba(248,113,113,.15);color:var(--danger);border-color:rgba(248,113,113,.3)}
  /* 离线模式切换栏 */
  .offline-bar{
    display:flex;align-items:center;gap:10px;flex-shrink:0;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:8px 14px;margin-bottom:14px;font-size:13px;color:var(--sub);
  }
  .offline-bar label{display:flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap}
  .offline-bar input[type=checkbox]{accent-color:var(--accent2);width:16px;height:16px;cursor:pointer}
  .rename-btn{
    background:none;border:1px solid var(--line);color:var(--sub);font-size:16px;
    border-radius:6px;cursor:pointer;padding:2px 8px;line-height:1.4;transition:.12s;
  }
  .rename-btn:hover{background:var(--panel2);color:var(--accent);border-color:var(--accent)}
  .rename-btn:disabled{opacity:.3;cursor:not-allowed}
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;
    z-index:1000;backdrop-filter:blur(4px);
  }
  .modal-box{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:24px 28px;min-width:420px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .modal-box h3{margin:0 0 16px;font-size:16px;color:var(--txt)}
  .modal-box input{
    width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:8px;padding:10px 12px;font-size:14px;outline:none;margin-bottom:14px;
  }
  .modal-box input:focus{border-color:var(--accent)}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end}
  .modal-actions button{
    padding:8px 20px;border-radius:8px;border:none;font-weight:600;font-size:13px;cursor:pointer;transition:.12s;
  }
  .modal-actions .btn-cancel{background:var(--panel2);color:var(--sub)}
  .modal-actions .btn-cancel:hover{background:var(--line)}
  .modal-actions .btn-confirm{background:var(--accent);color:#fff}
  .modal-actions .btn-confirm:hover{opacity:.85}
  .modal-actions .btn-confirm:disabled{opacity:.4;cursor:not-allowed}
  .offline-bar select{
    flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:8px;padding:6px 10px;font-size:12px;outline:none;cursor:pointer;
    max-width:360px;
  }
  .offline-bar select:focus{border-color:var(--accent)}
  .offline-bar select:disabled{opacity:.4;cursor:not-allowed}
  .offline-bar .hint{font-size:11px;color:var(--sub);white-space:nowrap}


  .row{display:flex;gap:16px;flex:1;min-height:0}
  .col{
    flex:1;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    display:flex;flex-direction:column;min-height:0;max-height:100%;
  }
  .col .head{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 14px;border-bottom:1px solid var(--line);font-size:12px;color:var(--sub);flex-shrink:0;
  }
  .col .head b{color:var(--txt);font-weight:600}
  .stage{
    flex:1;display:flex;align-items:center;justify-content:center;
    padding:10px;background:#0a0e18;min-height:0;overflow:hidden;
  }
  .stage iframe,.stage video,.stage audio{
    max-width:100%;max-height:100%;border-radius:8px;background:#000;width:100%;height:100%;
    object-fit:contain;
  }
  .placeholder{color:var(--sub);text-align:center;font-size:13px;line-height:1.6}
  .placeholder .big{font-size:30px;margin-bottom:6px}
  .textwrap{
    flex:1;overflow-y:auto;padding:10px 14px;font-size:14px;line-height:1.75;color:#d6deef;min-height:0;
  }
  .seg-row{
    display:flex;gap:10px;padding:8px 6px;transition:background .15s;border-radius:6px;
    border-left:3px solid transparent;
  }
  .seg-row:nth-child(odd){background:rgba(255,255,255,.02)}
  .seg-row:hover{background:rgba(108,140,255,.08);border-left-color:var(--accent2)}
  .seg-row:last-child{margin-bottom:0}
  .seg-time{
    flex-shrink:0;font-size:11px;font-weight:600;color:var(--accent2);font-variant-numeric:tabular-nums;
    cursor:pointer;padding:2px 8px;border-radius:4px;min-width:68px;text-align:center;transition:.12s;
    line-height:1.6;align-self:flex-start;margin-top:2px;background:rgba(52,211,153,.08);
    font-family:"SF Mono",Menlo,monospace;letter-spacing:.3px;
  }
  .seg-time:hover{background:var(--accent2);color:#0b0f1a}
  .seg-text{
    flex:1;word-break:break-word;white-space:pre-wrap;line-height:1.7;
    color:#d6deef;
  }
  /* 段落间距 (连续分段之间的视觉呼吸) */
  .segs{margin:0}
  .segs + .text-plain{margin-top:12px}
  .text-plain{white-space:pre-wrap;word-break:break-word}
  /* ==== 字幕同步高亮 ==== */
  .seg-row{position:relative}
  .seg-row.active{background:rgba(108,140,255,.12)!important;border-left-color:var(--accent)!important}
  .seg-row.past{opacity:.55}
  .seg-row.active .seg-text{color:#fff}
  .seg-row .seg-text{transition:color .15s}
  /* 逐词高亮: 词被包裹为 <span class="w"> */
  .seg-row .seg-text .w{
    display:inline-block;
    border-radius:3px;
    padding:0 2px;
    margin:0 -1px;
    transition:background .12s,color .12s;
  }
  .seg-row .seg-text .w.spoken{
    background:rgba(108,140,255,.18);
    color:#cfd8e8;
  }
  .seg-row.active .seg-text .w.spoken{
    background:rgba(108,140,255,.3);
    color:#e6ecf7;
  }
  .seg-row.active .seg-text .w.current{
    background:var(--accent);
    color:#0b0f1a;
    font-weight:700;
  }
  /* “同步跟随”切换按钮 */
  .sync-toggle{
    display:inline-flex;align-items:center;gap:4px;
    font-size:11px;color:var(--sub);cursor:pointer;
    background:none;border:none;padding:2px 6px;border-radius:4px;
    transition:.12s;
  }
  .sync-toggle:hover{color:var(--accent);background:var(--panel2)}
  .sync-toggle.on{color:var(--accent2)}
  .tools{
    display:flex;gap:6px;padding:10px 14px;border-top:1px solid var(--line);flex-wrap:wrap;flex-shrink:0;
  }
  .tools button{
    background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;
    padding:6px 12px;font-size:12px;cursor:pointer;transition:.15s;
  }
  .tools button:hover{border-color:var(--accent)}
  .tools button.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0b0f1a;border:none;font-weight:600}
  .tools button.soon{opacity:.5;cursor:not-allowed}
  .status{
    padding:8px 14px;font-size:12px;border-top:1px solid var(--line);flex-shrink:0;
  }
  .status.ok{color:var(--accent2)} .status.err{color:var(--danger)} .status.run{color:var(--accent)}
  .pill{
    display:inline-block;background:var(--panel2);border:1px solid var(--line);
    border-radius:99px;padding:2px 8px;font-size:11px;color:var(--sub);
  }
  .textwrap::-webkit-scrollbar{width:5px}
  .textwrap::-webkit-scrollbar-track{background:transparent}
  .textwrap::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px}
  @media (max-width:860px){
    body{padding:12px}
    .row{flex-direction:column}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">V2</div>
    <h1>Video2Text <small>社媒视频一键转文案</small></h1>
  </header>

  <div class="bar">
    <input id="urlInput" type="url" placeholder="粘贴视频链接（抖音 / 小红书 / B站 / YouTube…）" autofocus
      onkeydown="if(event.key==='Enter') startIngest()" />
    <button id="goBtn" onclick="startIngest()">提取文案</button>
    <button id="stopBtn" class="btn-stop" style="display:none" onclick="stopIngest()">⏹ 停止</button>
    <label class="skip-label" title="已有转写结果的文件直接跳过 ASR">
      <input type="checkbox" id="skipExisting" checked /> ⏳ 跳过已转写
    </label>
  </div>


  <!-- 离线模式 -->
  <div class="offline-bar">
    <label><input type="checkbox" id="offlineToggle" onchange="toggleOffline()"> 📁 离线模式</label>
    <select id="fileSelect" disabled onchange="onFileSelect()">
      <option value="">— 选择已有音频文件 —</option>
    </select>
    <button id="renameBtn" class="rename-btn" disabled onclick="showRenameModal()" title="重命名文件">✏️</button>
    <span class="hint" id="offlineHint">跳过下载，直接用已有文件测试</span>
    <span id="existingBadge"></span>
  </div>


  <div class="row">
    <div class="col">
      <div class="head"><b>📺 预览</b><span id="left-meta" class="pill">等待输入</span></div>
      <div class="stage" id="stage">
        <div class="placeholder"><div class="big">🎬</div>在上方粘贴视频链接<br />点击「提取文案」开始</div>
      </div>
    </div>

    <div class="col" id="rightCol">
      <div class="head"><b>📝 文案</b><span id="right-meta" class="pill">等待处理</span><button id="syncToggle" class="sync-toggle on" onclick="toggleSyncFollow()" title="切换是否自动滚动跟随当前字符">⏮ 同步</button></div>
      <div class="textwrap" id="text">
        <div class="placeholder"><div class="big">💬</div>转写结果将在这里展示</div>
      </div>
      <div class="tools">
        <button class="primary" id="copy">📋 复制</button>
        <button id="exp-txt">📄 导出 TXT</button>
        <button id="exp-md">📝 导出 MD</button>
        <button class="soon" id="polish">✨ 一键润色</button>
        <button class="soon" id="quote">💎 金句提炼</button>
      </div>
      <div class="status" id="status">就绪</div>
    </div>
  </div>
</div>

<script>

const $ = id => document.getElementById(id);
let pollTimer = null;
let lastText = "";
let lastSegments = [];
let mediaEl = null;
let isYoutube = false;
let ytPlayer = null;

function formatTime(sec){
  if(sec == null || isNaN(sec)) return "00:00";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

async function startIngest(){
  const url = $("urlInput").value.trim();
  if(!url) return;
  // 跳过已转写检查
  const skip = $("skipExisting").checked;
  const file = $("fileSelect").value;
  if(skip && file && $("offlineToggle").checked){
    try {
      const r = await fetch("/api/check-existing?file_name=" + encodeURIComponent(file));
      const d = await r.json();
      if(d.transcribed && d.entry && d.entry.segments && d.entry.segments.length > 0){
        $("goBtn").disabled = false;
        lastText = d.entry.segments.map(s => s.text).join(" ");
        lastSegments = d.entry.segments;
        lastMediaType = d.entry.media_type || "audio";
        const fu = d.entry.file_url || "/files/" + encodeURIComponent(file);
        renderResult({
          text: lastText, segments: lastSegments, file_url: fu,
          media_type: lastMediaType, embed_url: null, title: d.entry.title || file,
          duration: d.entry.duration || 0, language: d.entry.language || "?",
          source: "index", channel: "skip"
        });
        setStatus("\u2705 已有转写，跳过 ASR", "ok");
        return;
      }
    } catch(e) { /* 检查失败，继续正常流程 */ }
  }
  $("goBtn").disabled = true;
  $("stopBtn").style.display = "";
  $("stage").innerHTML = '<div class="placeholder"><div class="big">\u23f3</div>正在处理，请稍候</div>';
  $("text").innerHTML = "";
  $("right-meta").textContent = "";
  if(pollTimer) clearInterval(pollTimer);
  lastText = "";
  lastSegments = [];
  mediaEl = null;
  isYoutube = false;
  ytPlayer = null;
  clearActiveHighlight();
  window._segRows = null;
  window._segData = null;
  _syncTimeupdateBound = false;

  try{
    const isOffline = $("offlineToggle").checked;
    let body;
    if(isOffline){
      const file = $("fileSelect").value;
      if(!file){ setStatus("请选择要测试的音频文件", "err"); $("goBtn").disabled = false; return; }
      body = JSON.stringify({url: file, local_file: file, force_download: false});
    } else {
      body = JSON.stringify({url, force_download: false});
    }
    const r1 = await fetch("/api/ingest", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body
    });
    const t = await r1.json();
    if(!r1.ok){ setStatus("失败：" + (t.detail||"未知错误"), "err"); $("goBtn").disabled = false; return; }
    lastTaskId = t.task_id;
    var taskId = t.task_id;
    setStatus("下载中…", "run");

    pollTimer = setInterval(async () => {
      try{
        const r2 = await fetch("/api/task/" + taskId);
        const d = await r2.json();
        const s = d.status;
        const res = d.result || {};

        if(s === "downloading") setStatus("\u23eb 下载中…", "run");
        else if(s === "transcribing") setStatus("\ud83c\udf99 语音转写中… (可能需要几分钟)", "run");
        else if(s === "error"){ setStatus("\u274c " + (d.error||"任务失败"), "err"); clearInterval(pollTimer); $("goBtn").disabled = false; $("stopBtn").style.display = "none"; }
        else if(s === "done"){
          clearInterval(pollTimer);
          renderResult(res, url);
          $("goBtn").disabled = false;
          $("stopBtn").style.display = "none";
        }
        else if(s === "cancelled"){
          clearInterval(pollTimer);
          $("goBtn").disabled = false;
          $("stopBtn").style.display = "none";
          setStatus("\u26a0\ufe0f 已停止", "warn");
        }
      }catch(e){ /* retry */ }
    }, 2000);

  }catch(e){
    setStatus("请求出错：" + e.message, "err");
    $("goBtn").disabled = false;
    $("stopBtn").style.display = "none";
  }
}

function renderResult(d, url){
  isYoutube = !!d.embed_url;
  lastText = d.text || "";
  lastSegments = d.segments || [];

  // ==== LEFT: PREVIEW ====
  const stage = $("stage");
  if(d.embed_url){
    stage.innerHTML = `<iframe id="ytFrame" src="${d.embed_url}" frameborder="0" allowfullscreen></iframe>`;
    $("left-meta").textContent = "\u25b6 YouTube";
    const iframe = document.getElementById("ytFrame");
    iframe.onload = () => { try{ ytPlayer = iframe.contentWindow; }catch(e){} };
  } else if(d.file_url && d.has_media !== false){
    const isVideo = d.media_type === "video";
    const tag = isVideo ? "video" : "video";
    stage.innerHTML = `<${tag} id="mediaPlayer" controls src="${d.file_url}" style="width:100%;height:100%;object-fit:contain"></${tag}>`;
    mediaEl = document.getElementById("mediaPlayer");
    $("left-meta").textContent = isVideo ? "\U0001f3ac 视频预览" : "\U0001f3b5 预览";
    // 绑定同步事件
    if(window._segRows && window._segRows.length){
      startSyncFollow();
      setupScrollDetection();
    }
  } else if(d.channel === "transcript"){
    stage.innerHTML = '<div class="placeholder"><div class="big">\ud83d\udcdd</div>字幕直取，无需媒体</div>';
    $("left-meta").textContent = "字幕模式";
  } else {
    stage.innerHTML = '<div class="placeholder"><div class="big">\ud83d\udce6</div>已处理</div>';
    $("left-meta").textContent = "完成";
  }

  // ==== RIGHT: TEXT ====
  if(d.channel === "asr"){
    if(lastSegments && lastSegments.length > 0){
      renderSegments(lastSegments);
    } else {
      $("text").innerHTML = `<div class="text-plain">${escHtml(lastText)}</div>`;
    }
    $("right-meta").textContent = "Whisper 转写" + (d.duration ? ` · ${formatTime(d.duration)}` : "");
    setStatus("\u2705 ASR 转写完成", "ok");
  } else if(d.channel === "transcript"){
    if(lastSegments && lastSegments.length > 0){
      renderSegments(lastSegments);
    } else {
      $("text").innerHTML = `<div class="text-plain">${escHtml(lastText)}</div>`;
    }
    $("right-meta").textContent = `字幕 ${d.source==="manual"?"手动":"自动"} · ${d.language||"?"}`;
    setStatus("\u2705 字幕直取成功", "ok");
    } else if(d.channel === "skip"){
    if(lastSegments && lastSegments.length > 0){
      renderSegments(lastSegments);
    } else {
      $("text").innerHTML = `<div class="text-plain">${escHtml(lastText)}</div>`;
    }
    $("right-meta").textContent = "已有转写";
    if(d.duration) $("right-meta").textContent += " · " + formatTime(d.duration);
    if(d.language) $("right-meta").textContent += " · " + d.language;
    setStatus("\u2705 已有转写，跳过 ASR", "ok");
  } else if(d.channel === "download_audio"){
    $("text").innerHTML = '<div class="placeholder"><div class="big">\u23f3</div>音频已下载，正在后台转写…</div>';
    $("right-meta").textContent = "\u23f3 等待转写";
    setStatus("音频已下载，等待转写完成", "run");
  } else {
    $("text").innerHTML = '<div class="placeholder"><div class="big">\u2705</div>下载完成</div>';
    $("right-meta").textContent = d.mode || "";
    setStatus("\u2705 下载完成", "ok");
  }
}

function renderSegments(segments){
  if(!segments || !segments.length){
    $("text").innerHTML = `<div class="text-plain">${escHtml(lastText)}</div>`;
    return;
  }
  // 保存 segment 数据 (供同步高亮使用)
  window._segData = segments;
  window._segRows = [];
  let html = '<div class="segs">';
  for(let i = 0; i < segments.length; i++){
    const seg = segments[i];
    const start = seg.start || 0;
    const end = seg.end || start;
    const label = `${formatTime(start)} - ${formatTime(end)}`;
    const txt = seg.text || "";
    // 按空格切词, 每个词包裹为 <span class="w">供逐词高亮用
    const words = txt.split(/(\s+)/);
    let wordHtml = "";
    for(const w of words){
      if(/^\s+$/.test(w)){
        wordHtml += w;  // 保留空格/换行
      } else if(w){
        wordHtml += `<span class="w">${escHtml(w)}</span>`;
      }
    }
    html += '<div class="seg-row" data-idx="' + i + '" data-start="' + start + '" data-end="' + end + '">';
    html += `<span class="seg-time" data-time="${start}" onclick="seekTo(${start})" title="点击跳转到 ${formatTime(start)}">${label}</span>`;
    html += `<span class="seg-text">${wordHtml}</span>`;
    html += '</div>';
  }
  html += '</div>';
  $("text").innerHTML = html;
  // 索引行元素
  const rows = $("text").querySelectorAll(".seg-row");
  for(let i = 0; i < rows.length; i++){
    window._segRows.push({
      row: rows[i],
      start: parseFloat(rows[i].dataset.start),
      end: parseFloat(rows[i].dataset.end),
      words: rows[i].querySelectorAll(".w")
    });
  }
  // 重启同步
  lastActiveIdx = -1;
  if(syncFollowEnabled) startSyncFollow();
}

// 同步状态
let syncFollowEnabled = true;   // 是否自动滚动跟随
let lastActiveIdx = -1;          // 上次激活的行 (-1 = 无)
let lastHighlightedWord = -1;    // 上次高亮的词 (避免 DOM 抖动)
let _syncRafId = null;           // requestAnimationFrame ID (用于词级更新)
let _syncTimeupdateBound = false; // 是否已绑定 timeupdate

function startSyncFollow(){
  if(!window._segRows || !window._segRows.length) return;
  // YouTube 嵌入: 用 postMessage 调 player.getCurrentTime()
  if(isYoutube && ytPlayer){
    if(_syncRafId) return;
    _syncRafId = setInterval(() => {
      try{
        ytPlayer.postMessage(JSON.stringify({event: "command", func: "getCurrentTime", args: []}), "*");
      }catch(e){}
    }, 250);
    if(!window._ytMessageBound){
      window.addEventListener("message", (e) => {
        try{
          const d = JSON.parse(e.data);
          if(typeof d === "object" && d.info && typeof d.info.currentTime === "number"){
            _ytCurrentTime = d.info.currentTime;
          }
        }catch(err){}
      });
      window._ytMessageBound = true;
    }
    if(!window._ytPollHandle){
      window._ytPollHandle = setInterval(() => {
        if(typeof _ytCurrentTime === "number") onMediaTimeUpdate();
      }, 150);
    }
    return;
  }
  // 普通 video/audio: timeupdate 事件
  if(mediaEl && !_syncTimeupdateBound){
    mediaEl.addEventListener("timeupdate", onMediaTimeUpdate);
    _syncTimeupdateBound = true;
  }
}

function onMediaTimeUpdate(){
  if(!window._segRows || !window._segRows.length) return;
  // YouTube 模式: 从 _ytCurrentTime 读
  let t;
  if(isYoutube && typeof _ytCurrentTime === "number"){
    t = _ytCurrentTime;
  } else if(mediaEl){
    t = mediaEl.currentTime;
  } else {
    return;
  }
  // 二分查找当前行 (性能优化)
  const rows = window._segRows;
  let lo = 0, hi = rows.length - 1, found = -1;
  while(lo <= hi){
    const mid = (lo + hi) >> 1;
    if(t < rows[mid].start){ hi = mid - 1; }
    else if(t > rows[mid].end){ lo = mid + 1; }
    else { found = mid; break; }
  }
  // 边界: 超过最后一段 (可能是静默区)
  if(found < 0 && t > rows[rows.length-1].end) found = rows.length - 1;
  // 边界: 还未到第一段
  if(found < 0 && t < rows[0].start) found = 0;

  if(found !== lastActiveIdx){
    // 行状态变化: 清理旧状, 设置新状
    if(lastActiveIdx >= 0 && rows[lastActiveIdx]){
      const old = rows[lastActiveIdx];
      old.row.classList.remove("active");
      for(const w of old.words) w.classList.remove("current");
    }
    // 所有已返的行加 past
    for(let i = 0; i < found; i++){
      if(rows[i].row.classList.contains("past")) continue;
      rows[i].row.classList.add("past");
    }
    // 未播的行去掉 past
    for(let i = found + 1; i < rows.length; i++){
      rows[i].row.classList.remove("past");
    }
    // 当前行加 active
    if(found >= 0 && found < rows.length){
      const cur = rows[found];
      cur.row.classList.add("active");
      // 自动滚动到可视区
      if(syncFollowEnabled && !isUserScrolling){
        scrollRowIntoView(cur.row);
      }
    }
    lastActiveIdx = found;
    lastHighlightedWord = -1;  // 重置词索引
  }

  // 逐词高亮: 估算当前行内已说出多少字符
  if(found >= 0 && found < rows.length){
    const cur = rows[found];
    const dur = cur.end - cur.start;
    if(dur > 0 && cur.words.length > 0){
      const progress = Math.max(0, Math.min(1, (t - cur.start) / dur));
      const targetWord = Math.min(cur.words.length - 1, Math.floor(progress * cur.words.length));
      if(targetWord !== lastHighlightedWord){
        // 更新词状态
        for(let i = 0; i < cur.words.length; i++){
          if(i < targetWord) cur.words[i].classList.add("spoken");
          else if(i === targetWord) cur.words[i].classList.add("current");
          else cur.words[i].classList.remove("spoken", "current");
        }
        lastHighlightedWord = targetWord;
      }
    }
  }
}

// 用户是否在手动滚动 (临时暂停自动滚动)
let isUserScrolling = false;
let _userScrollTimer = null;
function setupScrollDetection(){
  const textEl = $("text");
  if(!textEl) return;
  textEl.addEventListener("scroll", () => {
    isUserScrolling = true;
    if(_userScrollTimer) clearTimeout(_userScrollTimer);
    _userScrollTimer = setTimeout(() => { isUserScrolling = false; }, 3000);
  }, {passive: true});
}

function scrollRowIntoView(row){
  if(!row) return;
  const textEl = $("text");
  const rowRect = row.getBoundingClientRect();
  const containerRect = textEl.getBoundingClientRect();
  // 如果在可视区下半部, 滚到中间
  const top = rowRect.top - containerRect.top;
  const bottom = rowRect.bottom - containerRect.top;
  if(top < 50 || bottom > containerRect.height - 50){
    const targetTop = row.offsetTop - textEl.clientHeight / 2 + row.clientHeight / 2;
    textEl.scrollTo({top: Math.max(0, targetTop), behavior: "smooth"});
  }
}

function toggleSyncFollow(){
  syncFollowEnabled = !syncFollowEnabled;
  const btn = $("syncToggle");
  if(btn){
    btn.classList.toggle("on", syncFollowEnabled);
    btn.textContent = syncFollowEnabled ? "⏎ 同步" : "⏎ 手动";

}

function seekTo(time){
  if(mediaEl && typeof mediaEl.currentTime === "number"){
    mediaEl.currentTime = time;
    mediaEl.play().catch(() => {});
  } else if(isYoutube && ytPlayer){
    ytPlayer.postMessage(JSON.stringify({
      event: "command", func: "seekTo", args: [time, true]
    }), "*");
    ytPlayer.postMessage(JSON.stringify({
      event: "command", func: "playVideo", args: []
    }), "*");
  }
}

$("copy").onclick = () => {
  if(!lastText){ setStatus("暂无文字", "err"); return; }
  navigator.clipboard.writeText(lastText)
    .then(() => setStatus("\u2705 已复制", "ok"))
    .catch(() => setStatus("复制失败", "err"));
};

$("exp-txt").onclick = () => {
  if(!lastText){ setStatus("暂无文字", "err"); return; }
  let content = lastText;
  if(lastSegments && lastSegments.length){
    content = lastSegments.map(s => `[${formatTime(s.start)}] ${s.text}`).join("\n");
  }
  download(content, "transcript.txt", "text/plain");
};

$("exp-md").onclick = () => {
  if(!lastText){ setStatus("暂无文字", "err"); return; }
  const header = lastSegments && lastSegments.length ? "# 视频提取文案（带时间戳）\n\n" : "# 视频提取文案\n\n";
  let content = header;
  if(lastSegments && lastSegments.length){
    content += lastSegments.map(s => `**${formatTime(s.start)}** ${s.text}`).join("\n\n");
  }
  download(content, "transcript.md", "text/markdown");
};

function download(content, name, type){
  const blob = new Blob([content], {type});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
  URL.revokeObjectURL(a.href);
}
function setStatus(msg, cls){ const s=$("status"); s.textContent=msg; s.className="status "+(cls||""); }

// ---- 停止按钮 ----
function stopIngest(){
  if(!lastTaskId) return;
  $("stopBtn").disabled = true;
  fetch("/api/stop/" + lastTaskId, {method:"POST"}).then(r => r.json()).then(d => {
    setStatus("⏹ 正在停止…", "run");
  }).catch(() => {
    setStatus("✖ 停止失败", "err");

  });
}

// ---- 已转写检查 ----
async function checkExistingTranscript(fileName){
  const badge = $("existingBadge");
  if(!fileName){ badge.textContent=""; return; }
  try{
    const r = await fetch("/api/check-existing?file_name=" + encodeURIComponent(fileName));
    const data = await r.json();
    if(data.transcribed){
      const dur = data.entry.duration ? Math.round(data.entry.duration) + "s" : "";
      badge.innerHTML = "<span class='existing-badge'>✅ 已转写 " + dur + "</span>";
    } else {
      badge.innerHTML = "<span class='existing-badge warn'>✖ 未转写</span>";
    }
  }catch(e){ badge.textContent=""; }
}

// ---- 离线模式 ----
async function toggleOffline(){
  const on = $("offlineToggle").checked;
  $("fileSelect").disabled = !on;
  $("urlInput").disabled = on;
  $("offlineHint").textContent = on ? "选择已有文件直接 ASR 转写，无需下载" : "跳过下载，直接用已有文件测试";
  if(on){
    loadFileList2();
  } else {
    $("renameBtn").disabled = true;
  }
}

function onFileSelect(){
  const file = $("fileSelect").value;
  if(file){
    $("urlInput").value = file;
    $("offlineHint").textContent = "已选择: " + file + "，点击「提取文案」开始离线转写";
    $("renameBtn").disabled = false;
    if($("skipExisting").checked) checkExistingTranscript(file);
  } else {
    $("existingBadge").textContent = "";
    $("renameBtn").disabled = true;
  }
}

// 页面加载时预加载文件列表
// ---- 重命名 ----
function showRenameModal(){
  const file = $("fileSelect").value;
  if(!file) return;
  $("renameInput").value = file;
  $("renameConfirm").disabled = false;
  $("renameModal").style.display = "";
  setTimeout(() => $("renameInput").focus(), 100);
  const dot = file.lastIndexOf(".");
  if(dot > 0) $("renameInput").setSelectionRange(0, dot);
}
function hideRenameModal(){ $("renameModal").style.display = "none"; }
async function doRename(){
  const oldName = $("fileSelect").value;
  const newName = $("renameInput").value.trim();
  if(!oldName || !newName || oldName === newName){ hideRenameModal(); return; }
  $("renameConfirm").disabled = true;
  $("renameConfirm").textContent = "重命名中…";
  try{
    const r = await fetch("/api/rename", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({old_name: oldName, new_name: newName})
    });
    if(!r.ok){
      const err = await r.json();
      setStatus("\u2716 " + (err.detail || "\u91cd\u547d\u540d\u5931\u8d25"), "err");
      $("renameConfirm").disabled = false;
      $("renameConfirm").textContent = "\u786e\u5b9a\u91cd\u547d\u540d";
      return;
    }
    hideRenameModal();
    setStatus("\u2705 已\u91cd\u547d\u540d", "ok");
    await loadFileList2();
    $("fileSelect").value = newName;
    $("urlInput").value = newName;
    if($("skipExisting").checked) checkExistingTranscript(newName);
    $("renameBtn").disabled = false;
  }catch(e){
    setStatus("\u2716 \重\u547d\u540d\u5931\u8d25: " + e.message, "err");
    $("renameConfirm").disabled = false;
    $("renameConfirm").textContent = "\u786e\u5b9a\u91cd\u547d\u540d";
  }
}

// ---- 页面加载时预加载文件列表 ----
function loadFileList2(){
  fetch("/api/files").then(r => r.json()).then(files => {
    const sel = $("fileSelect");
    sel.innerHTML = '<option value="">— 选择已有音频文件 —</option>';
    for(const f of files){
      const opt = document.createElement("option");
      opt.value = f.name;
      opt.textContent = f.name + " (" + f.size_mb + "MB, " + f.ext + ")";
      sel.appendChild(opt);
    }
  }).catch(() => {});
}

document.addEventListener("DOMContentLoaded", () => {
  fetch("/api/files").then(r => r.json()).then(files => {
    if(files.length > 0){
      const sel = $("fileSelect");
      for(const f of files){
        const opt = document.createElement("option");
        opt.value = f.name;
        opt.textContent = `${f.name} (${f.size_mb}MB, ${f.ext})`;
        sel.appendChild(opt);
      }
    }
  }).catch(() => {});
  // 跳过已转写切换时重新检查
  $("skipExisting").addEventListener("change", () => {
    if($("skipExisting").checked){
      const file = $("fileSelect").value;
      if(file) checkExistingTranscript(file);
    } else {
      $("existingBadge").textContent = "";
    }
  });
});

      <button class="btn-cancel" onclick="hideRenameModal()">取消</button>
